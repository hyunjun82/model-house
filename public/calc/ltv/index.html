var won0=function(x){ return Math.floor(x+1e-4); };
var $=function(id){return document.getElementById(id);};
function korWon(won){ if(!won||won<=0) return '0원'; var eok=Math.floor(won/100000000), man=Math.round((won%100000000)/10000), p=[]; if(eok>0)p.push(eok+'억'); if(man>0)p.push(man.toLocaleString('ko-KR')+'만'); if(p.length===0)return comma(won); return p.join(' ')+'원'; }
function korWonShort(won){ if(!won||won<=0) return '0'; var eok=Math.floor(won/100000000), man=Math.round((won%100000000)/10000), p=[]; if(eok>0)p.push(eok+'억'); if(man>0)p.push(man.toLocaleString('ko-KR')+'만'); return p.join(' '); }
function segStyle(on){ var b='flex:1; border:none; border-radius:9px; padding:9px 6px; font-size:13px; cursor:pointer; transition:all .15s ease; white-space:nowrap;'; return on? b+' background:#fff; color:#15171C; font-weight:600; box-shadow:0 1px 2px rgba(21,23,28,.10), 0 1px 3px rgba(21,23,28,.06);' : b+' background:transparent; color:#7A828E; font-weight:500;'; }
function compute(){
  var price=(S.price||0)*10000, senior=(S.senior||0)*10000, lease=(S.lease||0)*10000;
  var r=LTV[S.region][S.type];
  var base=won0(price*r);
  var loan=Math.max(0, base-senior-lease);
  var capped=false;
  if((S.region==='reg'||S.region==='capital') && loan>600000000){ loan=600000000; capped=true; }
  return { r:r, base:base, minus:senior+lease, loan:loan, capped:capped, zero:(r===0) };
}
function render(){
  document.querySelectorAll('[data-region]').forEach(function(b){ b.style.cssText=segStyle(b.dataset.region===S.region); });
  document.querySelectorAll('[data-type]').forEach(function(b){ b.style.cssText=segStyle(b.dataset.type===S.type); });
  $('priceLabel').textContent=korWon((S.price||0)*10000);
  var c=compute();
  $('big').textContent=korWonShort(c.loan)+'원';
  $('capBadge').style.display=c.capped?'block':'none';
  $('zeroBadge').style.display=c.zero?'block':'none';
  $('r-ltv').textContent=(c.r*100)+'%';
  $('r-base').textContent=comma(c.base)+'원';
  $('r-minus').textContent=comma(c.minus)+'원';
  $('r-total').textContent=comma(c.loan);
  $('copyLabel').textContent=S.copied?'복사되었습니다':'결과 복사';
}
function bindNum(id,key){ var el=$(id); if(!el)return; el.addEventListener('input',function(e){ var raw=(e.target.value||'').replace(/[^0-9]/g,''); S[key]=raw?parseInt(raw,10):0; e.target.value=raw?parseInt(raw,10).toLocaleString('ko-KR'):''; S.copied=false; render(); }); }
document.querySelectorAll('[data-region]').forEach(function(b){ b.style.cursor='pointer'; b.addEventListener('click',function(){ S.region=b.dataset.region; S.copied=false; render(); }); });
document.querySelectorAll('[data-type]').forEach(function(b){ b.style.cursor='pointer'; b.addEventListener('click',function(){ S.type=b.dataset.type; S.copied=false; render(); }); });
bindNum('price','price'); bindNum('senior','senior'); bindNum('lease','lease');
$('reset').addEventListener('click',function(){ S=Object.assign({},DEF); $('price').value='100,000'; $('senior').value='0'; $('lease').value='0'; render(); });
$('copy').addEventListener('click',function(){ var c=compute(); var t='LTV '+(c.r*100)+'% · 담보 '+korWon((S.price||0)*10000)+' → 대출가능 '+korWon(c.loan)+' · 집계산'; try{ if(navigator.clipboard)navigator.clipboard.writeText(t); }catch(e){} S.copied=true; render(); clearTimeout(window._t); window._t=setTimeout(function(){ S.copied=false; render(); },1800); });
render();
<\/script>
</body>
</html>
